<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lua VM 混淆器</title>
  <link rel="stylesheet" href="style.css?v=6" />
</head>

<body>
  <main class="container">
    <section class="hero">
      <div>
        <h1>Lua VM 混淆器</h1>
        <p>
          導入 Lua 檔案後混淆並下載結果。可勾選基礎、高強度、陷阱混淆。
        </p>
      </div>

      <div class="badge">Levels Version</div>
    </section>

    <section class="content">
      <section class="upload-card">
        <h2>導入 Lua 檔案</h2>
        <p>選擇 <code>.lua</code> 或 <code>.txt</code> 檔案，混淆完成後下載輸出檔。</p>

        <label class="file-box" for="fileInput">
          <div class="file-icon">📄</div>
          <div>
            <strong id="fileName">點這裡選擇 Lua 檔案</strong>
            <span id="fileInfo">尚未選擇檔案</span>
          </div>
        </label>

        <input id="fileInput" type="file" accept=".lua,.txt,text/plain" />

        <div class="option-card">
          <h3>混淆選項</h3>

          <label class="check-row">
            <input type="checkbox" id="basicOption" checked disabled />
            <span>
              <strong>基礎 VM 混淆</strong>
              <small>把原始 Lua 轉成 VM 數字指令，保持比較好的相容性。</small>
            </span>
          </label>

          <label class="check-row">
            <input type="checkbox" id="strongOption" />
            <span>
              <strong>高強度混淆</strong>
              <small>增加二次數字變形、變數亂名、額外計算流程，輸出會更長。</small>
            </span>
          </label>

          <label class="check-row">
            <input type="checkbox" id="trapOption" />
            <span>
              <strong>陷阱混淆</strong>
              <small>加入假指令、假資料、無效分支，讓閱讀更混亂，但不影響正常執行。</small>
            </span>
          </label>
        </div>

        <div class="button-row">
          <button id="obfuscateBtn" disabled>開始 VM 混淆</button>
          <button class="soft-btn" id="downloadBtn" disabled>下載混淆結果</button>
          <button class="ghost-btn" id="resetBtn">重設</button>
        </div>
      </section>

      <section class="status-card">
        <div class="status-head">
          <h2>狀態</h2>
          <span id="statusText">等待導入檔案</span>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="stats-grid">
          <div class="stat">
            <span>原始大小</span>
            <strong id="inputSize">0 KB</strong>
          </div>

          <div class="stat">
            <span>輸出大小</span>
            <strong id="outputSize">0 KB</strong>
          </div>

          <div class="stat">
            <span>目前強度</span>
            <strong id="levelText">基礎</strong>
          </div>
        </div>

        <div class="preview-box">
          <h3>輸出預覽</h3>
          <pre id="previewText">混淆完成後，這裡只會顯示前面一小段預覽，完整內容請用下載。</pre>
        </div>
      </section>

      <section class="info-grid">
        <div class="info-box">
          <h3>建議怎麼選？</h3>
          <p>
            想穩定就只用基礎。想比較難看懂就開高強度。
            陷阱會讓檔案更亂、更大，測試沒問題再使用。
          </p>
        </div>

        <div class="info-box">
          <h3>執行限制</h3>
          <p>
            混淆後的 Lua 仍需要目標環境支援 <code>loadstring</code> 或 <code>load</code>。
          </p>
        </div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast">完成</div>

  <script src="script.js?v=6"></script>
</body>
</html>
